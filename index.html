<script>
const themeToggle=document.getElementById('theme-toggle');function applyTheme(light){document.documentElement.classList.toggle('light',light);themeToggle.textContent=light?'\u2600\uFE0F':'\u{1F319}';themeToggle.setAttribute('aria-label',light?'Switch to dark mode':'Switch to light mode');themeToggle.title=light?'Switch to dark mode':'Switch to light mode'}themeToggle.addEventListener('click',e=>{e.stopPropagation();applyTheme(!document.documentElement.classList.contains('light'))});
const frogFace=document.getElementById('frog-face'),foodBubble=document.getElementById('food-bubble'),frogResponse=document.getElementById('frog-response'),insideFrog=document.getElementById('inside-frog'),absorbIris=document.getElementById('absorb-iris'),mouthTunnel=document.getElementById('mouth-tunnel'),suctionLines=document.getElementById('suction-lines'),letMeOut=document.getElementById('let-me-out'),scene=document.getElementById('scene'),kissHeart=document.getElementById('kiss-heart'),foodBubbles=[...document.querySelectorAll('.food-bubble')];let enteringFrog=false,dragging=false,activeFoodBubble=foodBubble,responseTimer=null;const bubbleHomes=new WeakMap(),ABSORB_PRE_DELAY=180,ABSORB_DURATION=4000;
function setOpen(open){frogFace.classList.toggle('open',open)}function showKissHeart(){const mouth=getMouthCenter();kissHeart.style.left=mouth.x+'px';kissHeart.style.top=mouth.y-18+'px';kissHeart.classList.remove('show');kissHeart.offsetHeight;kissHeart.classList.add('show');document.body.classList.add('kissing');setTimeout(()=>{kissHeart.classList.remove('show');document.body.classList.remove('kissing')},1700)}function showFrogLine(text,duration=1400){clearTimeout(responseTimer);frogResponse.textContent=text;frogResponse.classList.add('show');responseTimer=setTimeout(()=>frogResponse.classList.remove('show'),duration)}function showFakeFoodLine(){showFrogLine(atob('dGhhdCdzIG5vdCByZWFsIGZvb2QsIEknbGwgZWF0IHlvdSBpbnN0ZWFk'),1400)}function isRealFood(bubble=activeFoodBubble){return bubble.textContent.trim().toLowerCase()==='real food'}function acceptRealFood(bubble=activeFoodBubble){foodBubbles.forEach(food=>food.style.opacity='0');setOpen(false);showKissHeart();showFrogLine('Thanks, that is real food.',2200);setTimeout(()=>{foodBubbles.forEach(food=>{resetFoodBubble(food,false);food.style.opacity=''});setOpen(false)},2200)}
function captureBubbleHome(bubble=activeFoodBubble){const r=bubble.getBoundingClientRect();bubbleHomes.set(bubble,{left:r.left+r.width/2,top:r.top+r.height/2})}
function clearBubbleInline(bubble=activeFoodBubble){bubble.style.left='';bubble.style.top='';bubble.style.transition='';bubble.style.opacity='';bubble.classList.remove('dragging')}
function placeBubbleAt(bubble,x,y){bubble.style.left=x+'px';bubble.style.top=y+'px'}
function resetFoodBubble(bubble=activeFoodBubble,animated=true){if(!bubbleHomes.has(bubble))captureBubbleHome(bubble);const home=bubbleHomes.get(bubble);bubble.style.transition=animated?'left .25s ease, top .25s ease, opacity .2s ease':'none';placeBubbleAt(bubble,home.left,home.top);const done=()=>{clearBubbleInline(bubble);setTimeout(()=>captureBubbleHome(bubble),30)};animated?setTimeout(done,260):done()}
function getMouthCenter(){const m=document.getElementById('mouth-cavity')||document.querySelector('#frog-svg .mouth'),r=m.getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2}}
function startDrag(bubble,x,y){if(enteringFrog||insideFrog.classList.contains('show'))return;activeFoodBubble=bubble;frogResponse.classList.remove('show');captureBubbleHome(bubble);dragging=true;bubble.classList.add('dragging');bubble.style.transition='none';placeBubbleAt(bubble,x,y);setOpen(true)}
function moveDrag(x,y){if(!dragging)return;placeBubbleAt(activeFoodBubble,x,y)}
function endDrag(x,y){if(!dragging)return;const bubble=activeFoodBubble;dragging=false;bubble.classList.remove('dragging');const mouth=getMouthCenter(),distance=Math.hypot(x-mouth.x,y-mouth.y);if(distance<Math.max(72,window.innerWidth*.12)){setOpen(true);if(isRealFood(bubble)){acceptRealFood(bubble)}else{showFakeFoodLine();bubble.style.opacity='0';setTimeout(()=>enterFrog(),1400)}}else{resetFoodBubble(bubble,true);setTimeout(()=>setOpen(false),240)}}
foodBubbles.forEach(bubble=>{bubble.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();startDrag(bubble,e.clientX,e.clientY);bubble.setPointerCapture?.(e.pointerId)});bubble.addEventListener('pointermove',e=>{if(dragging&&activeFoodBubble===bubble){e.preventDefault();moveDrag(e.clientX,e.clientY)}});bubble.addEventListener('pointerup',e=>{e.preventDefault();endDrag(e.clientX,e.clientY)});bubble.addEventListener('pointercancel',()=>{if(dragging&&activeFoodBubble===bubble){dragging=false;resetFoodBubble(bubble,true)}});bubble.addEventListener('touchstart',e=>{const t=e.touches[0];if(!t)return;e.preventDefault();e.stopPropagation();startDrag(bubble,t.clientX,t.clientY)},{passive:false});bubble.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();activeFoodBubble=bubble;setOpen(true);if(isRealFood(bubble)){acceptRealFood(bubble)}else{showFakeFoodLine();bubble.style.opacity='0';setTimeout(()=>enterFrog(),1400)}}})});
window.addEventListener('touchmove',e=>{if(!dragging)return;const t=e.touches[0];if(!t)return;e.preventDefault();moveDrag(t.clientX,t.clientY)},{passive:false});window.addEventListener('touchend',e=>{if(!dragging)return;const t=e.changedTouches[0];if(!t)return;e.preventDefault();endDrag(t.clientX,t.clientY)},{passive:false});
window.addEventListener('pointermove',e=>moveDrag(e.clientX,e.clientY));window.addEventListener('pointerup',e=>endDrag(e.clientX,e.clientY));frogFace.addEventListener('click',e=>{if(enteringFrog||e.target.closest('.food-bubble'))return;e.stopPropagation();setOpen(true)});
function setStagedShift(el,prefix,shiftX,shiftY,stages){el.style.setProperty(`--${prefix}-shift-x`,`${shiftX}px`);el.style.setProperty(`--${prefix}-shift-y`,`${shiftY}px`);stages.forEach(stage=>{el.style.setProperty(`--${prefix}-shift-x-${stage}`,`${shiftX*stage/100}px`);el.style.setProperty(`--${prefix}-shift-y-${stage}`,`${shiftY*stage/100}px`)})}
function enterFrog(){if(enteringFrog||insideFrog.classList.contains('show'))return;enteringFrog=true;frogResponse.classList.remove('show');document.body.classList.add('pre-absorbing');const sceneRect=scene.getBoundingClientRect(),target=document.getElementById('mouth-cavity')||document.querySelector('#frog-svg .mouth'),mouthRect=target.getBoundingClientRect(),mouthX=mouthRect.left+mouthRect.width*.5,mouthY=mouthRect.top+mouthRect.height*.46,shiftX=window.innerWidth/2-mouthX,shiftY=window.innerHeight/2-mouthY;scene.style.setProperty('--mouth-origin-x',`${mouthX-sceneRect.left}px`);scene.style.setProperty('--mouth-origin-y',`${mouthY-sceneRect.top}px`);setStagedShift(scene,'mouth',shiftX,shiftY,[12,35,82,100]);[absorbIris,mouthTunnel,suctionLines].forEach(el=>{el.style.left=`${mouthX}px`;el.style.top=`${mouthY}px`;el.classList.remove('active');el.offsetHeight});setTimeout(()=>{document.body.classList.remove('pre-absorbing');document.body.classList.add('absorbing');suctionLines.classList.add('active');mouthTunnel.classList.add('active');absorbIris.classList.add('active')},ABSORB_PRE_DELAY);setTimeout(()=>{insideFrog.classList.add('show');insideFrog.setAttribute('aria-hidden','false');absorbIris.classList.remove('active');mouthTunnel.classList.remove('active');suctionLines.classList.remove('active');document.body.classList.remove('pre-absorbing','absorbing');document.body.classList.add('inside');enteringFrog=false},ABSORB_PRE_DELAY+ABSORB_DURATION)}
function exitFrog(){insideFrog.classList.remove('show');insideFrog.setAttribute('aria-hidden','true');document.body.classList.remove('pre-absorbing','absorbing','inside');scene.style.transform='';foodBubbles.forEach(bubble=>{bubble.style.opacity='';resetFoodBubble(bubble,false)});setOpen(false)}letMeOut.addEventListener('click',e=>{e.stopPropagation();exitFrog()});window.addEventListener('load',()=>foodBubbles.forEach(captureBubbleHome));window.addEventListener('resize',()=>{foodBubbles.forEach(clearBubbleInline);setTimeout(()=>foodBubbles.forEach(captureBubbleHome),50)});
</script>
</body>
</html>
