<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="light dark" />
<title>Feed the Frog</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: light dark; }
  :root {
    --bg-top: #2c265f; --bg-bottom: #6a4a8a;
    --ground-top: #317f8f; --ground-bottom: #123f52;
    --pad-top: #72ca4f; --pad-bottom: #2e8137;
    --accent: #f0922e; --label: #ffd9a0;
    --toggle-bg: rgba(255,255,255,0.10); --toggle-border: rgba(255,255,255,0.24);
    --toggle-icon: #ffe27a; --glow: rgba(255,180,90,0.28);
  }
  :root.light {
    --bg-top: #6db6e8; --bg-bottom: #b9d9f0;
    --ground-top: #68cfd0; --ground-bottom: #26849d;
    --pad-top: #76d45a; --pad-bottom: #3b9340;
    --accent: #e87d18; --label: #7a4a14;
    --toggle-bg: rgba(255,255,255,0.36); --toggle-border: rgba(0,0,0,0.15);
    --toggle-icon: #e8870c; --glow: rgba(255,255,255,0.65);
  }
  body {
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% 28%, rgba(255,220,150,0.08), transparent 34%),
      linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
    user-select: none;
  }
  #header {
    position: fixed;
    top: 14px;
    left: 0;
    right: 0;
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }
  #header h1 {
    font-size: clamp(1.45rem, 3vw, 2rem);
    color: var(--label);
    letter-spacing: 2.4px;
    text-transform: uppercase;
    text-shadow: 0 0 20px var(--glow), 0 2px 0 rgba(0,0,0,0.18);
  }
  #theme-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 50;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1px solid var(--toggle-border);
    background: var(--toggle-bg);
    color: var(--toggle-icon);
    font-size: 1.2rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 22px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.16);
    transition: transform 0.2s ease, background 0.25s ease;
  }
  #theme-toggle:hover { transform: scale(1.1) rotate(15deg); }
  #theme-toggle:focus-visible, .pay-btn:focus-visible, #let-me-out:focus-visible { outline: 3px solid #ffe9a6; outline-offset: 4px; }
  #scene {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: grid;
    place-items: center;
    will-change: transform, filter;
    backface-visibility: hidden;
  }
  #stars {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.5;
    background:
      radial-gradient(circle at 12% 18%, rgba(255,240,190,0.95) 0 1px, transparent 2px),
      radial-gradient(circle at 28% 26%, rgba(255,240,190,0.7) 0 1px, transparent 2px),
      radial-gradient(circle at 74% 20%, rgba(255,240,190,0.75) 0 1px, transparent 2px),
      radial-gradient(circle at 88% 34%, rgba(255,240,190,0.55) 0 1px, transparent 2px);
  }
  :root.light #stars { opacity: 0; }
  .firefly {
    position: fixed;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #ffe88a;
    z-index: 4;
    pointer-events: none;
    box-shadow: 0 0 12px #ffe88a, 0 0 26px rgba(255,232,138,0.6);
    opacity: 0.62;
    animation: firefly 7s ease-in-out infinite;
  }
  .firefly:nth-child(2) { left: 18%; top: 57%; animation-delay: -1s; }
  .firefly:nth-child(3) { left: 73%; top: 49%; animation-delay: -3.2s; animation-duration: 8.5s; }
  .firefly:nth-child(4) { left: 61%; top: 66%; animation-delay: -5s; animation-duration: 6.8s; }
  .firefly:nth-child(5) { left: 34%; top: 45%; animation-delay: -2.4s; animation-duration: 9s; }
  :root.light .firefly { opacity: 0.22; }
  #ground {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 42vh;
    background:
      radial-gradient(ellipse at 50% 34%, rgba(255,255,255,0.26) 0 8%, transparent 27%),
      radial-gradient(ellipse at 34% 58%, rgba(65,205,197,0.32) 0 16%, transparent 34%),
      radial-gradient(ellipse at 68% 62%, rgba(0,61,86,0.28) 0 18%, transparent 36%),
      linear-gradient(180deg, var(--ground-top), var(--ground-bottom));
    z-index: 0;
  }
  #ground::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 18%;
    width: min(720px, 96vw);
    height: min(210px, 24vh);
    transform: translate(-50%, -50%);
    border: 2px solid rgba(255,255,255,0.22);
    border-radius: 50%;
    animation: ripple 4.2s ease-in-out infinite;
  }
  #lily-pad {
    position: fixed;
    left: 50%;
    top: calc(50% + 118px);
    width: min(640px, 96vw);
    height: min(250px, 30vh);
    transform: translate(-50%, -50%) rotate(-2deg);
    border-radius: 50%;
    background: conic-gradient(from 318deg at 50% 50%, transparent 0 34deg, var(--pad-top) 35deg 156deg, var(--pad-bottom) 360deg);
    box-shadow: inset 0 -18px 26px rgba(20,75,27,0.32), 0 20px 34px rgba(0,34,46,0.30);
    z-index: 2;
  }
  #lily-pad::after {
    content: "";
    position: absolute;
    inset: 14% 18%;
    border-top: 2px solid rgba(255,255,255,0.24);
    border-left: 2px solid rgba(255,255,255,0.14);
    border-radius: 50%;
  }
  #frog-face {
    position: fixed;
    left: 50%;
    top: 50%;
    width: min(560px, 90vw);
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 5;
    animation: breathe 4.4s ease-in-out infinite;
  }
  #frog-svg {
    display: block;
    width: 100%;
    height: auto;
    overflow: visible;
    filter: drop-shadow(0 16px 24px rgba(0,0,0,0.38));
  }
  #frog-label {
    position: absolute;
    top: -42px;
    left: 50%;
    transform: translateX(-50%) translateY(5px);
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(20,10,14,0.58);
    color: var(--label);
    font-size: 0.92rem;
    font-weight: 800;
    letter-spacing: 0.8px;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 8;
    pointer-events: none;
    box-shadow: 0 10px 24px rgba(0,0,0,0.22);
    backdrop-filter: blur(6px);
  }
  #frog-label::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -6px;
    width: 12px;
    height: 12px;
    transform: translateX(-50%) rotate(45deg);
    background: inherit;
  }
  #frog-face:hover #frog-label, #frog-face.open #frog-label { opacity: 1; transform: translateX(-50%) translateY(0); }
  #frog-face:hover #frog-svg { filter: drop-shadow(0 20px 30px rgba(0,0,0,0.42)) saturate(1.05); }
  #frog-svg .mouth {
    transform-box: fill-box;
    transform-origin: center top;
    transform: scaleY(0.07);
    transition: transform 0.32s cubic-bezier(.34,1.25,.6,1);
  }
  #frog-face.open #frog-svg .mouth { transform: scaleY(1); }
  #payment-menu {
    position: absolute;
    top: 72%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    width: 236px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.3s cubic-bezier(.34,1.3,.6,1);
    z-index: 9;
  }
  #frog-face.open #payment-menu {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
    transition-delay: 0.12s;
  }
  .pay-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    padding: 0 16px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.26);
    font-family: inherit;
    font-weight: 900;
    font-size: 0.98rem;
    letter-spacing: 0.3px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.34), inset 0 1px 0 rgba(255,255,255,0.25);
    background: linear-gradient(135deg,#77df78,#2f9a4b);
    color: #fff;
    text-shadow: 0 1px 0 rgba(0,0,0,0.24);
    transition: transform 0.15s ease, filter 0.15s ease;
  }
  .pay-btn:hover { transform: translateY(-2px) scale(1.04); filter: brightness(1.08); }
  #absorb-iris, #mouth-tunnel, #suction-lines {
    position: fixed;
    left: 50%;
    top: 50%;
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2);
  }
  #absorb-iris { width: 36px; height: 36px; z-index: 80; border-radius: 50%; background: #000; }
  #mouth-tunnel {
    width: 240px;
    height: 180px;
    z-index: 79;
    border-radius: 50%;
    background: radial-gradient(ellipse at center, rgba(44,15,24,0.8), rgba(86,34,50,0.36) 35%, rgba(240,146,46,0.14) 58%, transparent 72%);
    filter: blur(10px);
    mix-blend-mode: multiply;
  }
  #suction-lines {
    width: 520px;
    height: 520px;
    z-index: 78;
    border-radius: 50%;
    background: repeating-conic-gradient(from 8deg, transparent 0deg, rgba(255,220,150,0.16) 3deg, transparent 8deg, transparent 22deg);
    -webkit-mask-image: radial-gradient(circle, transparent 0 19%, #000 34%, transparent 71%);
    mask-image: radial-gradient(circle, transparent 0 19%, #000 34%, transparent 71%);
    filter: blur(1px);
  }
  #absorb-iris.active { animation: absorb-iris 4s cubic-bezier(.22,.68,.18,1) forwards; }
  #mouth-tunnel.active { animation: mouth-tunnel 4s cubic-bezier(.22,.68,.18,1) forwards; }
  #suction-lines.active { animation: suction-lines 4s cubic-bezier(.22,.68,.18,1) forwards; }
  #inside-frog {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: none;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 48%, rgba(104,30,54,0.58), rgba(32,5,16,0.2) 38%, transparent 62%),
      radial-gradient(circle at 20% 22%, rgba(155,55,86,0.20), transparent 25%),
      radial-gradient(circle at 80% 74%, rgba(120,37,70,0.24), transparent 29%),
      #020000;
  }
  #inside-frog::before {
    content: "";
    position: absolute;
    inset: -12%;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(125,39,63,0.22), transparent 40%),
      radial-gradient(ellipse at 70% 44%, rgba(190,82,96,0.12), transparent 36%);
    filter: blur(18px);
    animation: stomach-pulse 5s ease-in-out infinite;
  }
  #inside-frog::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 18% 78%, rgba(255,203,145,0.18) 0 3px, transparent 4px),
      radial-gradient(circle at 62% 32%, rgba(255,203,145,0.12) 0 2px, transparent 3px),
      radial-gradient(circle at 81% 62%, rgba(255,203,145,0.16) 0 3px, transparent 4px),
      radial-gradient(circle at 39% 48%, rgba(255,203,145,0.10) 0 2px, transparent 3px);
    animation: bubbles 9s linear infinite;
    pointer-events: none;
  }
  #inside-frog.show { display: block; }
  #stomach-note {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: min(640px, 86vw);
    padding: 20px 24px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), rgba(255,255,255,0.045));
    color: #ffe9c2;
    font-size: clamp(1.25rem, 3vw, 2.25rem);
    font-weight: 900;
    letter-spacing: 0.5px;
    text-align: center;
    text-shadow: 0 0 18px rgba(255,180,90,0.32), 0 2px 0 rgba(0,0,0,0.35);
    box-shadow: 0 22px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
    z-index: 2;
  }
  #let-me-out {
    position: absolute;
    top: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    min-height: 42px;
    padding: 0 18px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.26);
    background: rgba(255,255,255,0.10);
    color: #fff;
    font-weight: 800;
    font-size: 0.95rem;
    cursor: pointer;
    backdrop-filter: blur(7px);
    box-shadow: 0 12px 34px rgba(0,0,0,0.32);
  }
  #let-me-out:hover { background: rgba(255,255,255,0.17); transform: translateX(-50%) translateY(-1px); }
  body.pre-absorbing #payment-menu,
  body.absorbing #payment-menu,
  body.inside #payment-menu { opacity: 0; visibility: hidden; pointer-events: none; }
  body.absorbing #scene { animation: camera-mouth-zoom 4s cubic-bezier(.22,.68,.18,1) forwards; transform-origin: var(--mouth-origin-x, 50%) var(--mouth-origin-y, 50%); }
  body.inside #scene { transform: translate(var(--mouth-shift-x, 0px), var(--mouth-shift-y, 0px)) scale(15); filter: brightness(0.28) blur(3.4px); transform-origin: var(--mouth-origin-x, 50%) var(--mouth-origin-y, 50%); }
  body.absorbing #header, body.absorbing #theme-toggle, body.inside #header, body.inside #theme-toggle { animation: scene-fade 1s ease forwards; }
  body.absorbing #frog-svg .mouth { transform-origin: center center; animation: mouth-receive 4s cubic-bezier(.22,.68,.18,1) forwards; }
  @keyframes scene-fade { to { opacity: 0; } }
  @keyframes breathe { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.018,.992)} }
  @keyframes ripple { 0%,100%{transform:translate(-50%,-50%) scale(0.98);opacity:.55} 50%{transform:translate(-50%,-50%) scale(1.04);opacity:.82} }
  @keyframes firefly { 0%,100%{transform:translate(0,0) scale(.8);opacity:.18} 35%{transform:translate(22px,-18px) scale(1);opacity:.82} 68%{transform:translate(-18px,20px) scale(.9);opacity:.38} }
  @keyframes stomach-pulse { 0%,100%{transform:scale(1);opacity:.78} 50%{transform:scale(1.06);opacity:1} }
  @keyframes bubbles { from{transform:translateY(18px)} to{transform:translateY(-32px)} }
  @keyframes absorb-iris { 0%,38%{opacity:0;transform:translate(-50%,-50%) scale(.05)} 64%{opacity:.08;transform:translate(-50%,-50%) scale(1.2)} 84%{opacity:.68;transform:translate(-50%,-50%) scale(13)} 100%{opacity:1;transform:translate(-50%,-50%) scale(95)} }
  @keyframes mouth-tunnel { 0%{opacity:0;transform:translate(-50%,-50%) scale(.18)} 24%{opacity:.28;transform:translate(-50%,-50%) scale(.55)} 52%{opacity:.5;transform:translate(-50%,-50%) scale(1.8)} 78%{opacity:.35;transform:translate(-50%,-50%) scale(5)} 100%{opacity:0;transform:translate(-50%,-50%) scale(9)} }
  @keyframes suction-lines { 0%,16%{opacity:0;transform:translate(-50%,-50%) scale(.18) rotate(0)} 38%{opacity:.22;transform:translate(-50%,-50%) scale(.55) rotate(18deg)} 66%{opacity:.34;transform:translate(-50%,-50%) scale(1.35) rotate(52deg)} 88%{opacity:.16;transform:translate(-50%,-50%) scale(2.6) rotate(88deg)} 100%{opacity:0;transform:translate(-50%,-50%) scale(3.4) rotate(110deg)} }
  @keyframes mouth-receive { 0%{transform:scaleY(1)} 28%{transform:scale(1.04,1.08);filter:saturate(1.08)} 58%{transform:scale(1.12,1.22);filter:brightness(.82) saturate(1.18)} 100%{transform:scale(1.22,1.42);filter:brightness(.4) saturate(1.3)} }
  @keyframes camera-mouth-zoom { 0%{transform:scale(1);filter:none} 12%{transform:translate(var(--mouth-shift-x-12,0),var(--mouth-shift-y-12,0)) scale(1.1)} 28%{transform:translate(var(--mouth-shift-x-35,0),var(--mouth-shift-y-35,0)) scale(1.5)} 50%{transform:translate(var(--mouth-shift-x-82,0),var(--mouth-shift-y-82,0)) scale(2.75);filter:brightness(.96)} 74%{transform:translate(var(--mouth-shift-x-100,0),var(--mouth-shift-y-100,0)) scale(6.2);filter:brightness(.74) blur(.5px)} 100%{transform:translate(var(--mouth-shift-x,0),var(--mouth-shift-y,0)) scale(15);filter:brightness(.28) blur(3.4px)} }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<button id="theme-toggle" title="Switch to light mode" aria-label="Switch to light mode">🌙</button>
<div id="stars"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div class="firefly"></div>
<div id="suction-lines"></div>
<div id="mouth-tunnel"></div>
<div id="absorb-iris"></div>
<div id="inside-frog" aria-hidden="true">
  <button id="let-me-out" type="button">Let me out</button>
  <div id="stomach-note">Ribbit... welcome to my stomach.</div>
</div>
<div id="header"><h1>Feed the Frog</h1></div>
<div id="scene">
  <div id="ground"></div>
  <div id="lily-pad"></div>
  <div id="frog-face">
    <div id="frog-label">Feed me</div>
    <svg id="frog-svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7cc34a"/><stop offset="55%" stop-color="#4f9a32"/><stop offset="100%" stop-color="#356d22"/></linearGradient>
        <linearGradient id="blade" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5fae3a"/><stop offset="100%" stop-color="#2f6b1f"/></linearGradient>
        <radialGradient id="cavity" cx="50%" cy="22%" r="85%"><stop offset="0%" stop-color="#7e3a48"/><stop offset="55%" stop-color="#552232"/><stop offset="100%" stop-color="#2c0f18"/></radialGradient>
        <radialGradient id="eyeRim" cx="45%" cy="35%" r="70%"><stop offset="0%" stop-color="#ffd564"/><stop offset="60%" stop-color="#f0922e"/><stop offset="100%" stop-color="#b85e12"/></radialGradient>
        <radialGradient id="tongue" cx="50%" cy="35%" r="70%"><stop offset="0%" stop-color="#e98aa2"/><stop offset="100%" stop-color="#c25b76"/></radialGradient>
      </defs>
      <g stroke="url(#blade)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.95"><path d="M40 285 Q30 180 48 90"/><path d="M70 285 Q66 190 84 120"/><path d="M360 285 Q372 180 352 95"/><path d="M330 285 Q336 195 318 125"/></g>
      <g fill="#a85a2a"><rect x="42" y="60" width="11" height="34" rx="5"/><rect x="349" y="66" width="11" height="34" rx="5"/></g>
      <g stroke="#6e3b18" stroke-width="3" stroke-linecap="round"><line x1="47" y1="60" x2="47" y2="44"/><line x1="354" y1="66" x2="354" y2="50"/></g>
      <ellipse cx="200" cy="178" rx="196" ry="132" fill="url(#skin)"/>
      <g fill="#2f6b1f" opacity="0.4"><circle cx="120" cy="150" r="6"/><circle cx="280" cy="158" r="5"/><circle cx="80" cy="200" r="5"/><circle cx="330" cy="205" r="6"/><circle cx="200" cy="250" r="5"/></g>
      <ellipse cx="186" cy="120" rx="3" ry="4" fill="#234d16"/><ellipse cx="214" cy="120" rx="3" ry="4" fill="#234d16"/>
      <g class="mouth"><ellipse cx="200" cy="216" rx="158" ry="76" fill="#f0922e"/><ellipse cx="200" cy="216" rx="158" ry="76" fill="none" stroke="#c96d18" stroke-width="3"/><ellipse id="mouth-cavity" cx="200" cy="222" rx="142" ry="64" fill="url(#cavity)"/><ellipse cx="200" cy="196" rx="88" ry="30" fill="#1c0910" opacity="0.6"/><ellipse cx="200" cy="268" rx="100" ry="28" fill="url(#tongue)"/><ellipse cx="200" cy="262" rx="66" ry="15" fill="#f0a0b6" opacity="0.7"/></g>
      <g fill="url(#skin)"><ellipse cx="46" cy="262" rx="40" ry="26" transform="rotate(-12 46 262)"/><ellipse cx="354" cy="262" rx="40" ry="26" transform="rotate(12 354 262)"/></g>
      <g stroke="#2f6b1f" stroke-width="3" stroke-linecap="round"><line x1="22" y1="272" x2="6" y2="266"/><line x1="30" y1="280" x2="16" y2="282"/><line x1="378" y1="272" x2="394" y2="266"/><line x1="370" y1="280" x2="384" y2="282"/></g>
      <g><ellipse cx="118" cy="74" rx="56" ry="52" fill="url(#skin)"/><ellipse cx="282" cy="74" rx="56" ry="52" fill="url(#skin)"/><circle cx="120" cy="80" r="38" fill="url(#eyeRim)"/><circle cx="280" cy="80" r="38" fill="url(#eyeRim)"/><ellipse cx="120" cy="82" rx="20" ry="30" fill="#0d0a06"/><ellipse cx="280" cy="82" rx="20" ry="30" fill="#0d0a06"/><circle cx="112" cy="68" r="7" fill="#fff" opacity="0.9"/><circle cx="272" cy="68" r="7" fill="#fff" opacity="0.9"/></g>
    </svg>
    <div id="payment-menu"><button class="pay-btn" data-method="Free"><span>Hop in</span></button></div>
  </div>
</div>
<script>
const themeToggle = document.getElementById('theme-toggle');
function applyTheme(light) {
  document.documentElement.classList.toggle('light', light);
  themeToggle.textContent = light ? '☀️' : '🌙';
  themeToggle.setAttribute('aria-label', light ? 'Switch to dark mode' : 'Switch to light mode');
  themeToggle.title = light ? 'Switch to dark mode' : 'Switch to light mode';
}
themeToggle.addEventListener('click', e => { e.stopPropagation(); applyTheme(!document.documentElement.classList.contains('light')); });
const frogFace = document.getElementById('frog-face');
const insideFrog = document.getElementById('inside-frog');
const absorbIris = document.getElementById('absorb-iris');
const mouthTunnel = document.getElementById('mouth-tunnel');
const suctionLines = document.getElementById('suction-lines');
const letMeOut = document.getElementById('let-me-out');
const scene = document.getElementById('scene');
let menuOpen = false;
let enteringFrog = false;
const ABSORB_PRE_DELAY = 180;
const ABSORB_DURATION = 4000;
function setOpen(open) { menuOpen = open; frogFace.classList.toggle('open', open); }
frogFace.addEventListener('click', e => { if (enteringFrog || e.target.closest('#payment-menu')) return; e.stopPropagation(); setOpen(!menuOpen); });
document.addEventListener('click', () => { if (!enteringFrog && menuOpen) setOpen(false); });
function setStagedShift(el, prefix, shiftX, shiftY, stages) {
  el.style.setProperty(`--${prefix}-shift-x`, `${shiftX}px`);
  el.style.setProperty(`--${prefix}-shift-y`, `${shiftY}px`);
  stages.forEach(stage => {
    el.style.setProperty(`--${prefix}-shift-x-${stage}`, `${shiftX * stage / 100}px`);
    el.style.setProperty(`--${prefix}-shift-y-${stage}`, `${shiftY * stage / 100}px`);
  });
}
function enterFrog() {
  if (enteringFrog || insideFrog.classList.contains('show')) return;
  enteringFrog = true;
  document.body.classList.add('pre-absorbing');
  const sceneRect = scene.getBoundingClientRect();
  const target = document.getElementById('mouth-cavity') || document.querySelector('#frog-svg .mouth');
  const mouthRect = target.getBoundingClientRect();
  const mouthX = mouthRect.left + mouthRect.width * 0.5;
  const mouthY = mouthRect.top + mouthRect.height * 0.46;
  const shiftX = window.innerWidth / 2 - mouthX;
  const shiftY = window.innerHeight / 2 - mouthY;
  scene.style.setProperty('--mouth-origin-x', `${mouthX - sceneRect.left}px`);
  scene.style.setProperty('--mouth-origin-y', `${mouthY - sceneRect.top}px`);
  setStagedShift(scene, 'mouth', shiftX, shiftY, [12, 35, 82, 100]);
  [absorbIris, mouthTunnel, suctionLines].forEach(el => { el.style.left = `${mouthX}px`; el.style.top = `${mouthY}px`; el.classList.remove('active'); el.offsetHeight; });
  setTimeout(() => { document.body.classList.remove('pre-absorbing'); document.body.classList.add('absorbing'); suctionLines.classList.add('active'); mouthTunnel.classList.add('active'); absorbIris.classList.add('active'); }, ABSORB_PRE_DELAY);
  setTimeout(() => { insideFrog.classList.add('show'); insideFrog.setAttribute('aria-hidden', 'false'); absorbIris.classList.remove('active'); mouthTunnel.classList.remove('active'); suctionLines.classList.remove('active'); document.body.classList.remove('pre-absorbing', 'absorbing'); document.body.classList.add('inside'); enteringFrog = false; }, ABSORB_PRE_DELAY + ABSORB_DURATION);
}
function exitFrog() { insideFrog.classList.remove('show'); insideFrog.setAttribute('aria-hidden', 'true'); document.body.classList.remove('pre-absorbing', 'absorbing', 'inside'); scene.style.transform = ''; setOpen(false); }
document.querySelectorAll('.pay-btn').forEach(btn => btn.addEventListener('click', e => { e.stopPropagation(); enterFrog(); }));
letMeOut.addEventListener('click', e => { e.stopPropagation(); exitFrog(); });
</script>
</body>
</html>
